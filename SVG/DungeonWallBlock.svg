<svg
    xmlns="http://www.w3.org/2000/svg"
    width="256"
    height="256"
    viewBox="0 0 256 256">

  <!-- Transparent background -->
  <rect x="0" y="0" width="256" height="256" fill="white" />

  <!-- Stone outlines (no fill, black stroke) -->
  <g fill="none" stroke="#000000" stroke-width="3" stroke-linejoin="round">

    <!-- Vertical joints -->
    <line x1="64"  y1="0"   x2="64"  y2="256" />
    <line x1="128" y1="0"   x2="128" y2="256" />
    <line x1="192" y1="0"   x2="192" y2="256" />

    <!-- Horizontal joints (staggered rows) -->
    <!-- Row 1 -->
    <line x1="0"   y1="32"  x2="256" y2="32" />
    <!-- Row 2 -->
    <line x1="0"   y1="64"  x2="256" y2="64" />
    <!-- Row 3 -->
    <line x1="0"   y1="96"  x2="256" y2="96" />
    <!-- Row 4 -->
    <line x1="0"   y1="128" x2="256" y2="128" />
    <!-- Row 5 -->
    <line x1="0"   y1="160" x2="256" y2="160" />
    <!-- Row 6 -->
    <line x1="0"   y1="192" x2="256" y2="192" />
    <!-- Row 7 -->
    <line x1="0"   y1="224" x2="256" y2="224" />

    <!-- Staggered vertical breaks to avoid a perfect grid (gives more "stone" feel) -->
    <!-- On even rows, add short verticals between main joints -->
    <!-- Row at y=32 to 64 -->
    <line x1="32"  y1="32"  x2="32"  y2="64" />
    <line x1="160" y1="32"  x2="160" y2="64" />
    <line x1="224" y1="32"  x2="224" y2="64" />

    <!-- Row at y=96 to 128 -->
    <line x1="32"  y1="96"  x2="32"  y2="128" />
    <line x1="160" y1="96"  x2="160" y2="128" />
    <line x1="224" y1="96"  x2="224" y2="128" />

    <!-- Row at y=160 to 192 -->
    <line x1="32"  y1="160" x2="32"  y2="192" />
    <line x1="160" y1="160" x2="160" y2="192" />
    <line x1="224" y1="160" x2="224" y2="192" />

    <!-- On odd rows, offset breaks differently -->
    <!-- Row at y=64 to 96 -->
    <line x1="96"  y1="64"  x2="96"  y2="96" />
    <line x1="224" y1="64"  x2="224" y2="96" />

    <!-- Row at y=128 to 160 -->
    <line x1="96"  y1="128" x2="96"  y2="160" />
    <line x1="224" y1="128" x2="224" y2="160" />

    <!-- Row at y=192 to 224 -->
    <line x1="96"  y1="192" x2="96"  y2="224" />
    <line x1="224" y1="192" x2="224" y2="224" />

  </g>
</svg>

