<svg
    xmlns="http://www.w3.org/2000/svg"
    width="256"
    height="256"
    viewBox="0 0 256 256">

  <!-- Transparent background -->
  <rect x="0" y="0" width="256" height="256" fill="white" />

  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="round">

    <!-- Large sparkle -->
    <line x1="128" y1="80"  x2="128" y2="40" />
    <line x1="128" y1="80"  x2="128" y2="120" />
    <line x1="128" y1="80"  x2="158" y2="80" />
    <line x1="128" y1="80"  x2="98"  y2="80" />
    <line x1="128" y1="80"  x2="150" y2="58" />
    <line x1="128" y1="80"  x2="106" y2="102" />
    <line x1="128" y1="80"  x2="150" y2="102" />
    <line x1="128" y1="80"  x2="106" y2="58" />

    <!-- Medium sparkles -->
    <g stroke-width="2.5">
      <line x1="60" y1="150" x2="60" y2="130" />
      <line x1="60" y1="150" x2="60" y2="170" />
      <line x1="60" y1="150" x2="75" y2="150" />
      <line x1="60" y1="150" x2="45" y2="150" />

      <line x1="200" y1="150" x2="200" y2="130" />
      <line x1="200" y1="150" x2="200" y2="170" />
      <line x1="200" y1="150" x2="215" y2="150" />
      <line x1="200" y1="150" x2="185" y2="150" />
    </g>

    <!-- Small sparkles -->
    <g stroke-width="2">
      <line x1="40" y1="60" x2="40" y2="50" />
      <line x1="40" y1="60" x2="40" y2="70" />
      <line x1="40" y1="60" x2="50" y2="60" />
      <line x1="40" y1="60" x2="30" y2="60" />

      <line x1="220" y1="60" x2="220" y2="50" />
      <line x1="220" y1="60" x2="220" y2="70" />
      <line x1="220" y1="60" x2="230" y2="60" />
      <line x1="220" y1="60" x2="210" y2="60" />

      <line x1="128" y1="200" x2="128" y2="190" />
      <line x1="128" y1="200" x2="128" y2="210" />
      <line x1="128" y1="200" x2="138" y2="200" />
      <line x1="128" y1="200" x2="118" y2="200" />
    </g>

  </g>
</svg>