<svg
    xmlns="http://www.w3.org/2000/svg"
    width="256"
    height="256"
    viewBox="0 0 256 256">

  <!-- Transparent background -->
  <rect x="0" y="0" width="256" height="256" fill="white" />

  <!-- Slashes: // // // // // // // -->
  <g fill="none" stroke="#000" stroke-width="4" stroke-linecap="round">

    <!-- First band of slashes -->
    <line x1="0"   y1="48"  x2="48"  y2="0" />
    <line x1="32"  y1="80"  x2="80"  y2="32" />
    <line x1="64"  y1="112" x2="112" y2="64" />
    <line x1="96"  y1="144" x2="144" y2="96" />
    <line x1="128" y1="176" x2="176" y2="128" />
    <line x1="160" y1="208" x2="208" y2="160" />
    <line x1="192" y1="240" x2="240" y2="192" />

    <!-- Second band to fill the tile more -->
    <line x1="-32" y1="80"  x2="16"  y2="32" />
    <line x1="0"   y1="112" x2="48"  y2="64" />
    <line x1="32"  y1="144" x2="80"  y2="96" />
    <line x1="64"  y1="176" x2="112" y2="128" />
    <line x1="96"  y1="208" x2="144" y2="160" />
    <line x1="128" y1="240" x2="176" y2="192" />
    <line x1="160" y1="272" x2="208" y2="224" />

  </g>
</svg>